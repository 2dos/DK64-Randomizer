syntax = "proto3";

package randomizer.proto;

import "common/slam_level.proto";

message BLockerOption {
    enum BLockerRando {
        B_LOCKER_RANDO_UNSPECIFIED = 0;
        B_LOCKER_RANDO_PRE_SELECTED = 1;
        B_LOCKER_RANDO_EASY_RANDOM = 2;
        B_LOCKER_RANDO_NORMAL_RANDOM = 3;
        B_LOCKER_RANDO_HARD_RANDOM = 4;
        B_LOCKER_RANDO_CHAOS_B_LOCKERS = 5;
    }

    BLockerRando opt = 1;

    repeated int32 amounts = 2;

    optional int32 maximum = 3;
}

message TroffNScoffOption {
    enum TNSRando {
        TNS_RANDO_UNSPECIFIED = 0;
        TNS_RANDO_PRE_SELECTED = 1;
        TNS_RANDO_NORMAL_RANDOM = 2;
        TNS_RANDO_HARD_RANDOM = 3;
    }

    TNSRando opt = 1;

    repeated int32 amounts = 2;

    optional int32 maximum = 3;
}

message MedalsForJetpac {
    enum MedalReqRando {
        MEDAL_REQ_RANDO_UNSPECIFIED = 0;
        MEDAL_REQ_RANDO_PRE_SELECTED = 1;
        MEDAL_REQ_RANDO_EASY_RANDOM = 2;
        MEDAL_REQ_RANDO_NORMAL_RANDOM = 3;
        MEDAL_REQ_RANDO_HARD_RANDOM = 4;
    }

    MedalReqRando opt = 1;

    optional int32 selected_quantity = 2;
}

message PearlsForMermaid {
    enum PearlReqRando {
        PEARL_REQ_RANDO_UNSPECIFIED = 0;
        PEARL_REQ_RANDO_PRE_SELECTED = 1;
        PEARL_REQ_RANDO_EASY_RANDOM = 2;
        PEARL_REQ_RANDO_NORMAL_RANDOM = 3;
        PEARL_REQ_RANDO_HARD_RANDOM = 4;
    }

    PearlReqRando opt = 1;

    optional int32 selected_quantity = 2;
}

message FairiesForFairyQueen {
    enum FairyReqRando {
        FAIRY_REQ_RANDO_UNSPECIFIED = 0;
        FAIRY_REQ_RANDO_PRE_SELECTED = 1;
        FAIRY_REQ_RANDO_EASY_RANDOM = 2;
        FAIRY_REQ_RANDO_NORMAL_RANDOM = 3;
        FAIRY_REQ_RANDO_HARD_RANDOM = 4;
    }

    FairyReqRando opt = 1;

    optional int32 selected_quantity = 2;
}

message ColoredBananasForMedal {
    enum CBReqRando {
        CB_REQ_RANDO_UNSPECIFIED = 0;
        CB_REQ_RANDO_PRE_SELECTED = 1;
        CB_REQ_RANDO_EASY_RANDOM = 2;
        CB_REQ_RANDO_NORMAL_RANDOM = 3;
        CB_REQ_RANDO_HARD_RANDOM = 4;
        CB_REQ_RANDO_PROGRESSIVE = 5;
    }

    CBReqRando opt = 1;

    optional int32 selected_quantity = 2;
}

message ProgressiveSwitchStrength {
    bool enabled = 1;

    repeated common.SlamLevel slam_levels = 2;
}

