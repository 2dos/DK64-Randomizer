        SWITCH_ITEM_MONKEYPORT = 2;
        SWITCH_ITEM_BABOON_BLAST = 3;
        SWITCH_ITEM_BABOON_BALLOON = 4;
        SWITCH_ITEM_GORILLA_GONE = 5;
        SWITCH_ITEM_BONGOS = 6;
        SWITCH_ITEM_GUITAR = 7;
        SWITCH_ITEM_TROMBONE = 8;
