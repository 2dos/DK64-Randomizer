        SWITCH_ITEM_GRAPE = 16;
        SWITCH_ITEM_FEATHER = 17;
        SWITCH_ITEM_PINEAPPLE = 18;
        SWITCH_ITEM_DK = 19;
        SWITCH_ITEM_DIDDY = 20;
        SWITCH_ITEM_LANKY = 21;
