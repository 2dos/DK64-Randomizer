message RequirementSettings {
    BLockerOption b_locker_option = 1;

    bool maximize_helm_b_locker = 2;

    TroffNScoffOption tns_option = 3;

    MedalsForJetpac medals_for_jetpac = 4;

    PearlsForMermaid pearls_for_mermaid = 5;

    FairiesForFairyQueen fairies_for_fairy_queen = 6;

    ColoredBananasForMedal cbs_for_medal = 7;

    bool open_lobbies = 8;

    ProgressiveSwitchStrength progressive_switch_strength = 9;

    Switchsanity switchsanity = 10;

    bool smaller_shops = 11;

    bool tooie_style_shops = 12;

    bool free_trade_agreement = 13;

    repeated Barrier removed_barriers = 14;

    GalleonWater galleon_water = 15;

    FungiTime fungi_time = 16;

    ShopPrices shop_prices = 17;

    ActivateBananaports activate_bananaports = 18;

    repeated FasterCheck faster_checks = 19;

    PuzzleRando puzzle_rando = 20;
}