syntax = "proto3";

package randomizer.proto;

import "common/level.proto";

enum EntranceRandomizer {
    ENTRANCE_RANDOMIZER_UNSPECIFIED = 0;
    ENTRANCE_RANDOMIZER_VANILLA = 1;
    ENTRANCE_RANDOMIZER_LEVEL_ORDER = 2;
    ENTRANCE_RANDOMIZER_COMPLEX_LEVEL_ORDER = 3;
    ENTRANCE_RANDOMIZER_LOADING_ZONES = 4;
    ENTRANCE_RANDOMIZER_DECOUPLED_LOADING_ZONES = 5;
}

enum CrossMapBananaports {
    CROSS_MAP_BANANAPORTS_UNSPECIFIED = 0;
    CROSS_MAP_BANANAPORTS_OFF = 1;
    CROSS_MAP_BANANAPORTS_COUPLED = 2;
    CROSS_MAP_BANANAPORTS_DECOUPLED = 3;
}

message KongModels {
    enum KongModel {
        KONG_MODEL_UNSPECIFIED = 0;
        KONG_MODEL_DK = 1;
        KONG_MODEL_DIDDY = 2;
        KONG_MODEL_LANKY = 3;
        KONG_MODEL_TINY = 4;
        KONG_MODEL_CHUNKY = 5;
        KONG_MODEL_KRUSHA = 6;
    }

    KongModel dk_model = 1;
    KongModel diddy_model = 2;
    KongModel lanky_model = 3;
    KongModel tiny_model = 4;
    KongModel chunky_model = 5;
}

message ColoredBananaRandomizer {
    bool enabled = 1;

    repeated common.LevelId cb_randomized_levels = 2;
}

enum KasplatRandomizer {
    KASPLAT_RANDOMIZER_UNSPECIFIED = 0;
    KASPLAT_RANDOMIZER_VANILLA = 1;
    KASPLAT_RANDOMIZER_VANILLA_LOCATIONS = 2;
    KASPLAT_RANDOMIZER_LOCATION_SHUFFLE = 3;
}

message BananaportRandomizer{    
    enum BananaportRandomizerOption {
        BANANAPORT_RANDOMIZER_OPTION_UNSPECIFIED = 0;
        BANANAPORT_RANDOMIZER_OPTION_VANILLA = 1;
        BANANAPORT_RANDOMIZER_OPTION_HALF_VANILLA = 2;
        BANANAPORT_RANDOMIZER_OPTION_ON = 3;
    }

    enum BananaportArea {
        BANANAPORT_AREA_UNSPECIFIED = 0;
        BANANAPORT_AREA_JAPES = 1;
        BANANAPORT_AREA_AZTEC_MAIN = 2;
        BANANAPORT_AREA_AZTEC_LLAMA = 3;
        BANANAPORT_AREA_FACTORY = 4;
        BANANAPORT_AREA_GALLEON = 5;
        BANANAPORT_AREA_FOREST = 6;
        BANANAPORT_AREA_CAVES = 7;
        BANANAPORT_AREA_CASTLE_MAIN = 8;
        BANANAPORT_AREA_CASTLE_CRYPT = 9;
        BANANAPORT_AREA_ISLES = 10;
    }

    BananaportRandomizerOption opt = 1;

    repeated BananaportArea bananaport_randomized_levels = 2;
}

enum PortalRandomizer {
    PORTAL_RANDOMIZER_UNSPECIFIED = 0;
    PORTAL_RANDOMIZER_VANILLA = 1;
    PORTAL_RANDOMIZER_MAIN_ONLY = 2;
    PORTAL_RANDOMIZER_ON = 3;
}

enum CrownEnemies {
