message HelmHurry {
    bool enabled = 1;

    int32 starting_time = 2;
    int32 golden_banana_time = 3;
    int32 blueprint_time = 4;
    int32 company_coin_time = 5;
    int32 move_time = 6;
    int32 banana_medal_time = 7;
    int32 rainbow_coin_time = 8;
    int32 boss_key_time = 9;
    int32 battle_crown_time = 10;
    int32 bean_time = 11;
    int32 pearl_time = 12;
    int32 kong_time = 13;
    int32 fairy_time = 14;
    int32 cb_time = 15;
    int32 trap_time = 16;
}

enum DamageEnum {
    DAMAGE_ENUM_UNSPECIFIED = 0;
    DAMAGE_ENUM_NORMAL = 1;
    DAMAGE_ENUM_DOUBLE_DAMAGE = 2;
    DAMAGE_ENUM_QUAD_DAMAGE = 3;
    DAMAGE_ENUM_OHKO = 4;
}

message OverworldSettings {
    // World Navigation
    EntranceRandomizer entrance_randomizer = 1;
    bool shuffle_helm_location = 2;
    CrossMapBananaports cross_map_bananaports = 3;
    bool random_starting_location = 4;
    KongModels kong_models = 5;

    // Location Randomizers
    bool dirt_patch_randomizer = 6;
    bool banana_coin_randomizer = 7;
    bool banana_fairy_randomizer = 8;
    bool melon_crate_randomizer = 9;
    bool battle_crown_randomizer = 10;
    bool race_coin_randomizer = 11;
    bool randomize_pickups = 12;
    bool shuffle_shop_locations = 13;
    ColoredBananaRandomizer cb_randomizer = 14;
    KasplatRandomizer kasplat_randomizer = 15;
    BananaportRandomizer bananaport_randomizer = 16;
    bool wrinky_door_randomizer = 17;
    bool tns_portal_randomizer = 18;
    bool vanilla_door_shuffle = 19;
    bool dos_doors = 20;
    PortalRandomizer dk_portal_randomizer = 21;

    // Bosses
    bool shuffle_boss_location = 22;
    bool k_rool_phases_as_bosses = 23;

    // Enemies
    repeated ShuffledEnemy shuffled_enemies = 24;
    CrownEnemies crown_enemies = 25;
    bool random_enemy_speed = 26;
    bool random_enemy_size = 27;

    // Bonus Barrels
    repeated ShuffledBonusBarrel shuffled_bonus_barrels = 28;
    bool disable_hard_minigames = 29;
    bool auto_complete_bonus_barrels = 30;

    // Difficulty
    bool no_heals = 31;
    bool no_melon_slice_drops = 32;
    bool ice_traps_damage_player = 33;
    bool mirror_mode = 34;
    bool irondonk = 35;
    bool tag_barrels_disabled = 36;
    HelmHurry helm_hurry_mode = 37;
    bool hard_enemies = 38;
    bool water_is_lava = 39;
    bool reduced_fall_damage_threshold = 40;
    bool shuffled_jetpac_enemies = 41;
    bool lower_max_refill_amounts = 42;
    bool strict_helm_timer = 43;
    bool angry_caves = 44;
    bool fast_balloons = 45;
    bool donk_in_the_dark_world = 46;
    bool donk_in_the_sky = 47;
    bool fast_mad_jack = 48;
    bool alternative_mad_jack_kongs = 49;
    bool pufftoss_star_rando = 50;
    bool pufftoss_star_raised = 51;
    bool kut_out_phase_rando = 52;
    bool k_rool_toes_rando = 53;
    bool beta_lanky_phase = 54;
    DamageEnum damage = 55;
}