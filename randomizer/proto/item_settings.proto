enum IceTrapModel {
    ICE_TRAP_MODEL_UNSPECIFIED = 0;
    ICE_TRAP_MODEL_SIMPLE = 1;
    ICE_TRAP_MODEL_COMPLEX = 2;
    ICE_TRAP_MODEL_FAIR = 3;
}

message ItemPool {
    repeated ItemRandoListSelected items = 1;
    // Decoupled only
    repeated ItemRandoListSelected checks = 2;
}

message StartingMovePool {
    repeated StartingMove items = 1;
    int32 count_given = 2;
}

