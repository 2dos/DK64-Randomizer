message IceTrapWeights {
    int32 bubble = 1;
    int32 reverse = 2;
    int32 slow = 3;
    int32 disable_a = 4;
    int32 disable_b = 5;
    int32 disable_z = 6;
    int32 disable_c_up = 7;
    int32 get_out = 8;
    int32 dry = 9;
    int32 flip = 10;
    int32 ice_floor = 11;
    int32 paper = 12;
    int32 slip = 13;
    int32 animal = 14;
    int32 rockfall = 15;
    int32 disable_tag = 16;
}

message IceTrapSettings {
    int32 count = 1;
    IceTrapModel model = 2;
    IceTrapWeights weights = 3;
}

message ItemCounts {
    int32 golden_bananas = 1;
    int32 banana_medals = 2;
    int32 banana_fairies = 3;
    int32 battle_crowns = 4;
    int32 rainbow_coins = 5;
    int32 pearls = 6;
}

message ItemSettings {
    bool decouple_item_rando = 1;

    repeated ItemPool pools = 2;

    repeated StartingMovePool starting_move_pools = 3;

    repeated ItemRandoFiller filler_items = 4;

    IceTrapSettings ice_traps = 5;
    
    ItemCounts item_counts = 6;
    
    int32 max_snide_reward_requirement = 7;
}
